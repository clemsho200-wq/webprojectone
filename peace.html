<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #4CAF50;
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 50px;
        }

        /* SECTIONS */
        .section {
            padding: 40px;
            text-align: center;
        }

        .section h2 {
            color: #333;
        }

        .card {
            background: #f4f4f4;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>Hello, I'm [Clement]</h1>
        <p>Beginner Developer 🚀</p>
        <a href="#contact" class="btn">Hire Me</a>
    </div>

    <!-- ABOUT -->
    <div class="section" id="about">
        <h2>About Me</h2>
        <div class="card">
            <p>I am learning web development and building my skills step by step.</p>
        </div>
    </div>

    <!-- SKILLS -->
    <div class="section" id="skills">
        <h2>My Skills</h2>
        <div class="card">
            <p>HTML | CSS | GitHub</p>
        </div>
    </div>

    <!-- CONTACT -->
    <div class="section" id="contact">
        <h2>Contact Me</h2>
        <div class="card">
            <p>Email: clemsho200@gmail.com</p>
        </div>
    </div>

</body>
</html>
